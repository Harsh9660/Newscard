version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: newscard
      POSTGRES_USER: newscard
      POSTGRES_PASSWORD: newscard
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  web:
    build: .
    command: python backend/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=newscard
      - DB_USER=newscard
      - DB_PASSWORD=newscard
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
      - redis
volumes:
  postgres_data:
