<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEWSCARD — Business Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: #0d1117;
        color: #e6edf3;
        font-family: "JetBrains Mono", Consolas, monospace;
      }
      #boot-msg {
        padding: 2rem;
        max-width: 520px;
      }
      #boot-msg h1 {
        color: #e94560;
        font-size: 1.1rem;
      }
      #boot-msg pre {
        background: #1e1e2e;
        padding: 1rem;
        border-radius: 6px;
        overflow: auto;
        font-size: 12px;
        color: #f44336;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-msg">
        <h1>NEWSCARD</h1>
        <p>Loading application…</p>
      </div>
    </div>
    <script>
      window.addEventListener("error", function (e) {
        var el = document.getElementById("boot-msg");
        if (!el) return;
        el.innerHTML =
          "<h1>NEWSCARD failed to start</h1><p>Try a hard refresh (Ctrl+Shift+R) or restart the server.</p><pre>" +
          (e.message || e) +
          "</pre>";
      });
      window.addEventListener("unhandledrejection", function (e) {
        var el = document.getElementById("boot-msg");
        if (!el) return;
        el.innerHTML =
          "<h1>NEWSCARD failed to start</h1><pre>" +
          (e.reason && e.reason.message ? e.reason.message : String(e.reason)) +
          "</pre>";
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
